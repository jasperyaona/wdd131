<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Dynamic Web Fundamentals - Jasper James Yaona</title>
    <meta name="description" content="WDD 131 - Dynamic Web Fundamentals. Jasper James Yaona. Contains Phillipines Data">
    <link rel="stylesheet" href="styles/place.css" />
    <link rel="stylesheet" href="styles/place-large.css" />
    <script src="scripts/place.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>Philippines</h1>
    </header>
    <main>
        
            <picture class="hero">
                  <source srcset="images/hero-large.webp" media="(min-width: 700px)" >
                  <img src="images/hero-small.webp" alt="Beautiful view of the Philippines">

            </picture>
        
         <section class="card data">
        <h2>Data</h2>

         <ul>
        <li><strong>Area:</strong> 300,000 km²</li>
        <li><strong>Population:</strong> 115 Million</li>
        <li><strong>Capital:</strong> Manila</li>
        <li><strong>Languages:</strong> Filipino, English</li>
        <li><strong>Currency:</strong> Philippine Peso</li>
    </ul>
    </section>

    <section class="card weather">
        <h2>Weather</h2>

        <img src="images/weather.svg" alt="Weather icon" class="weather-icon">

        <ul>
        <li><strong>Temperature:</strong> 30°C</li>
        <li><strong>Wind:</strong> 10 km/h</li>
        <li><strong>Humidity:</strong> 72%</li>
        <li><strong>Wind Chill:</strong> <span id="windchill"></span></li>
    </ul>
    </section>

    </main>
    <footer>
        <p>
            ©<span id="currentyear"></span> - Jasper James Yaona - Philippines
        </p>
        <p id="lastModified">

        </p>
    </footer>
</body>

</html>
